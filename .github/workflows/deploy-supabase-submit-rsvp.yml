# Deploys only the RSVP Edge Function when Supabase CLI credentials are configured.
#
# Repo → Settings → Secrets and variables:
#   - Secret: SUPABASE_ACCESS_TOKEN — Dashboard → Account → Access Tokens (`sbp_...`)
#   - Secret OR Variable: SUPABASE_PROJECT_REF — Dashboard → Project → Settings → General → Reference ID
#
# Function secrets (Sheets): set in Dashboard → Edge Functions → submit-rsvp → Secrets
# (not in GitHub). See .env.example
name: Deploy submit-rsvp (Supabase Edge)

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/submit-rsvp/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-submit-rsvp.yml"
  workflow_dispatch:

concurrency:
  group: supabase-submit-rsvp
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF_SECRET: ${{ secrets.SUPABASE_PROJECT_REF }}
      PROJECT_REF_VAR: ${{ vars.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy submit-rsvp
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::notice::Skipping Edge deploy — add repository secret SUPABASE_ACCESS_TOKEN"
            exit 0
          fi
          REF="${PROJECT_REF_SECRET:-}"
          if [ -z "$REF" ]; then REF="${PROJECT_REF_VAR:-}"; fi
          if [ -z "$REF" ]; then
            echo "::error::Set secret or variable SUPABASE_PROJECT_REF"
            exit 1
          fi
          supabase functions deploy submit-rsvp --project-ref "$REF"
