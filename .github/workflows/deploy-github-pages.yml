# Published files live on branch "gh-pages" (peaceiris pushes ./dist).
# In the repo: Settings → Pages → Build and deployment → Source MUST be:
#   "Deploy from a branch" → Branch: gh-pages → Folder: / (root) → Save
# If Source is left on "GitHub Actions", github.io will stay 404 (nothing is deployed via that API).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Branch-based Pages (avoids deploy-pages API 404 when Actions source isn’t enabled yet).
permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Repository secret: same Apps Script Web App URL as local VITE_RSVP_SCRIPT_URL
          VITE_RSVP_SCRIPT_URL: ${{ secrets.VITE_RSVP_SCRIPT_URL }}

      - name: SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
