# Published files live on branch "gh-pages" (peaceiris pushes ./dist).
# In the repo: Settings → Pages → Build and deployment → Source MUST be:
#   "Deploy from a branch" → Branch: gh-pages → Folder: / (root) → Save
# If Source is left on "GitHub Actions", github.io will stay 404 (nothing is deployed via that API).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Branch-based Pages (avoids deploy-pages API 404 when Actions source isn’t enabled yet).
permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # RSVP URL must be readable on `main`: use **repository** Secrets or Variables (not Environment tabs).
    # Variable fallback is fine—the Apps Script `/exec` URL is not hidden from guests anyway.
    env:
      # Secret masks in logs; if unset, Variables → same name fills the build (Settings → Secrets and variables → Actions).
      VITE_RSVP_SCRIPT_URL: ${{ secrets.VITE_RSVP_SCRIPT_URL || vars.VITE_RSVP_SCRIPT_URL }}
      # Keep webhook values in Secrets only (never Variables).
      VITE_RSVP_WEBHOOK_SECRET: ${{ secrets.VITE_RSVP_WEBHOOK_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Check VITE_RSVP_SCRIPT_URL (secret or variable)
        run: |
          if [ -z "${VITE_RSVP_SCRIPT_URL:-}" ]; then
            echo "::warning::VITE_RSVP_SCRIPT_URL is empty on this workflow — RSVP will fail on the site."
            echo "::warning::Add it on GitHub → Settings → Secrets and variables → Actions → **Repository secrets** OR **Variables** (exact name: VITE_RSVP_SCRIPT_URL). Not under Environments unless you tie the job to that environment."
          else
            echo "RSVP script URL is configured for this build."
          fi

      - name: Build
        run: npm run build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
