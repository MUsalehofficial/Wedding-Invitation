# Published files live on branch "gh-pages" (peaceiris pushes ./dist).
# In the repo: Settings → Pages → Build and deployment → Source MUST be:
#   "Deploy from a branch" → Branch: gh-pages → Folder: / (root) → Save
# If Source is left on "GitHub Actions", github.io will stay 404 (nothing is deployed via that API).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Branch-based Pages (avoids deploy-pages API 404 when Actions source isn’t enabled yet).
permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Loads secrets from Settings → Secrets → Environments → github-pages (not only repo-level secrets).
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      # RSVP only works if this secret is set; we warn but do not fail deploy (site can still publish).
      - name: Check VITE_RSVP_SCRIPT_URL (Actions secret)
        run: |
          if [ -z "${VITE_RSVP_SCRIPT_URL:-}" ]; then
            echo "::warning::VITE_RSVP_SCRIPT_URL is not set — RSVP will not work until you add it."
            echo "::warning::Add VITE_RSVP_SCRIPT_URL as a repo Actions secret OR under Environments → github-pages → Environment secrets."
          else
            echo "RSVP script URL is configured for this build."
          fi
        env:
          VITE_RSVP_SCRIPT_URL: ${{ secrets.VITE_RSVP_SCRIPT_URL }}

      - name: Build
        run: npm run build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Repo or Environment (github-pages) secret — matches local .env VITE_RSVP_SCRIPT_URL
          VITE_RSVP_SCRIPT_URL: ${{ secrets.VITE_RSVP_SCRIPT_URL }}
          # If Apps Script RSVP_WEBHOOK_SECRET is set, use same value here (repo or github-pages env secret).
          VITE_RSVP_WEBHOOK_SECRET: ${{ secrets.VITE_RSVP_WEBHOOK_SECRET }}

      - name: SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
