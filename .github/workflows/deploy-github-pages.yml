# Published files live on branch "gh-pages" (peaceiris pushes ./dist).
# In the repo: Settings → Pages → Build and deployment → Source MUST be:
#   "Deploy from a branch" → Branch: gh-pages → Folder: / (root) → Save
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Supabase anon URL + anon key — safe by design for browser apps; Sheets creds stay in Edge secrets only.
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Check Supabase RSVP build inputs
        run: |
          if [ -z "${VITE_SUPABASE_URL:-}" ] || [ -z "${VITE_SUPABASE_PUBLISHABLE_KEY:-}" ]; then
            echo "::warning::Set Repository secret or variable VITE_SUPABASE_URL and VITE_SUPABASE_PUBLISHABLE_KEY (supabase/functions/submit-rsvp writes to Sheets)."
          else
            echo "Supabase public env vars are set for RSVP."
          fi

      - name: Build
        run: npm run build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
